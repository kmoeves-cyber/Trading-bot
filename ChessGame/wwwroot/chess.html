<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Chess &#x265F;</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d1117">
  <link rel="stylesheet" href="/chess/chess.css?v=6">
</head>
<body>

<!-- Rule announcement banner -->
<div id="rule-banner">
  <div class="rule-banner-emoji">&#x26A1;</div>
  <div class="rule-banner-name">Rule Change!</div>
  <div class="rule-banner-desc">A new rule has been activated.</div>
  <button id="rule-ok">Got it!</button>
</div>

<div id="chess-app">
  <div id="chess-header">
    <div id="chess-title">&#x265F; Chaos Chess</div>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="resign-btn">Resign</button>
      <button id="new-game-btn">New Game</button>
    </div>
  </div>

  <div id="status-bar"></div>

  <div id="turn-indicator">
    <span class="turn-dot white" id="turn-dot"></span>
    <span id="turn-label">White's Turn</span>
    <span id="turn-counter">Rule changes in 4 moves</span>
  </div>

  <div id="active-rules-bar"></div>

  <div id="board-wrapper">
    <div id="chess-board"></div>
  </div>

  <div id="move-log-section">
    <div id="move-log-header">Move History</div>
    <div id="move-log"></div>
  </div>

  <a href="http://162.243.169.132:5000" style="font-size:12px;color:#8b949e;text-decoration:none;margin-top:4px">&#x2190; Back to Dashboard</a>
</div>

<!-- Rule info modal -->
<div class="modal-overlay hidden" id="rule-info-modal">
  <div class="modal-box">
    <div class="rule-info-emoji">&#x26A1;</div>
    <div class="rule-info-name"></div>
    <div class="rule-info-desc"></div>
    <div class="rule-info-turns"></div>
    <button id="rule-info-close">Got it</button>
  </div>
</div>

<!-- Promotion modal -->
<div class="modal-overlay hidden" id="promotion-modal">
  <div class="modal-box">
    <h2>Promote Pawn</h2>
    <p>Choose a piece to promote to:</p>
    <div id="promo-choices"></div>
  </div>
</div>

<!-- Game over modal -->
<div class="modal-overlay hidden" id="game-over-modal">
  <div class="modal-box">
    <div class="winner-banner">&#x265A;</div>
    <div class="outcome-text">Game Over</div>
    <div class="outcome-sub"></div>
    <button id="play-again-btn">Play Again</button>
  </div>
</div>

<div id="size-dbg" style="position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#0f0;font-size:10px;text-align:center;z-index:9999;padding:2px;font-family:monospace;pointer-events:none"></div>
<script src="/chess/chess.js?v=7"></script>
</body>
</html>
